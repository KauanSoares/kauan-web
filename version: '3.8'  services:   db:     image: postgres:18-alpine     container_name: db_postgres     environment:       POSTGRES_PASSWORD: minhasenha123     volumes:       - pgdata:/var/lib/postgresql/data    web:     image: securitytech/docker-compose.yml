version: '3.8'

services:
  db:
    image: postgres:18-alpine
    container_name: db_postgres
    environment:
      POSTGRES_PASSWORD: minhasenha123
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    image: securitytech/kauan-web:v1
    container_name: app_flask
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
    depends_on:
      - db
    restart: on-failure

volumes:
  pgdata:
